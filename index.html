<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="A private message, written for its intended recipient." />
  <meta name="theme-color" content="#f3a6bd" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/branding/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/branding/favicon-192.png" />
  <link rel="apple-touch-icon" href="assets/branding/favicon-192.png" />
  <title>The Unsaid Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Italiana&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=20260629-scrollfix3" />
  <link rel="stylesheet" href="css/landing-v2.css?v=20260629-scrollfix3" />
</head>
<body class="landing-page dream-gate">
  <div class="dream-world" aria-hidden="true">
    <svg class="dream-art" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="presentation">
      <defs>
        <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f8c4d3" />
          <stop offset="0.44" stop-color="#b9e3ef" />
          <stop offset="1" stop-color="#8bc9d8" />
        </linearGradient>
        <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#fff4cf" />
          <stop offset="1" stop-color="#ffc5a8" />
        </linearGradient>
        <linearGradient id="hillOne" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f06f93" />
          <stop offset="1" stop-color="#bf5e96" />
        </linearGradient>
        <linearGradient id="hillTwo" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f5d58e" />
          <stop offset="1" stop-color="#e9a977" />
        </linearGradient>
        <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#d7fbff" />
          <stop offset="1" stop-color="#6dc4d9" />
        </linearGradient>
        <filter id="blur20"><feGaussianBlur stdDeviation="20" /></filter>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#703f78" flood-opacity=".18" />
        </filter>
        <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
          <feGaussianBlur stdDeviation="7" result="b" />
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <rect width="1600" height="1000" fill="url(#sky)" />
      <circle cx="1280" cy="235" r="240" fill="url(#sun)" opacity=".96" />
      <circle cx="1295" cy="220" r="294" fill="#fff7d9" opacity=".17" filter="url(#blur20)" />

      <g class="cloud cloud-a" fill="#fffaf1" opacity=".84">
        <ellipse cx="235" cy="190" rx="122" ry="34" />
        <circle cx="184" cy="174" r="42" />
        <circle cx="251" cy="156" r="61" />
        <circle cx="316" cy="178" r="40" />
      </g>
      <g class="cloud cloud-b" fill="#fff7ef" opacity=".68">
        <ellipse cx="835" cy="155" rx="142" ry="36" />
        <circle cx="770" cy="141" r="48" />
        <circle cx="840" cy="120" r="64" />
        <circle cx="912" cy="143" r="44" />
      </g>
      <g class="cloud cloud-c" fill="#fff7ef" opacity=".74">
        <ellipse cx="1480" cy="470" rx="150" ry="38" />
        <circle cx="1407" cy="448" r="48" />
        <circle cx="1480" cy="425" r="66" />
        <circle cx="1552" cy="453" r="44" />
      </g>

      <path d="M0 780 C260 660 410 725 610 662 C870 580 1030 640 1220 570 C1400 506 1510 525 1600 495 L1600 1000 L0 1000 Z" fill="url(#hillTwo)" opacity=".96" />
      <path d="M0 846 C260 738 420 794 665 720 C900 650 1120 760 1330 666 C1450 612 1530 620 1600 602 L1600 1000 L0 1000 Z" fill="url(#hillOne)" />
      <path d="M910 610 C1090 660 1165 742 1115 1000 L1342 1000 C1370 823 1265 665 1130 565 Z" fill="url(#river)" opacity=".9" />
      <path d="M929 622 C1088 681 1152 752 1130 1000" fill="none" stroke="#fff" stroke-width="7" opacity=".42" />

      <g class="dream-castle" filter="url(#softShadow)">
        <ellipse cx="1235" cy="566" rx="232" ry="55" fill="#784b8e" opacity=".2" />
        <path d="M1088 560 L1088 400 L1150 400 L1150 560 Z" fill="#ffe7db" />
        <path d="M1165 560 L1165 342 L1235 342 L1235 560 Z" fill="#ffd6d2" />
        <path d="M1250 560 L1250 382 L1316 382 L1316 560 Z" fill="#f9e5d1" />
        <path d="M1330 560 L1330 420 L1388 420 L1388 560 Z" fill="#ffe5e0" />
        <path d="M1075 404 L1119 346 L1163 404 Z" fill="#6d6cb5" />
        <path d="M1152 346 L1200 274 L1248 346 Z" fill="#795fa8" />
        <path d="M1238 385 L1283 323 L1328 385 Z" fill="#5b74b8" />
        <path d="M1318 422 L1359 365 L1400 422 Z" fill="#735d9f" />
        <path d="M1179 490 Q1200 450 1221 490 L1221 560 L1179 560 Z" fill="#7e5f96" />
        <circle cx="1119" cy="462" r="12" fill="#7ec9d8" />
        <circle cx="1282" cy="446" r="12" fill="#7ec9d8" />
        <circle cx="1358" cy="476" r="11" fill="#7ec9d8" />
        <path d="M1200 274 L1200 239" stroke="#76518b" stroke-width="5" />
        <path d="M1200 239 C1225 246 1232 226 1252 237 C1232 248 1221 264 1200 257 Z" fill="#ef6f91" />
      </g>

      <g class="planet planet-a" filter="url(#softShadow)">
        <circle cx="1015" cy="218" r="53" fill="#9ddbb3" />
        <path d="M979 205 C1001 185 1028 192 1048 177 M973 224 C999 206 1028 220 1054 204 M982 247 C1002 229 1032 244 1048 230" fill="none" stroke="#527f78" stroke-width="9" stroke-linecap="round" opacity=".8" />
      </g>
      <g class="planet planet-b" filter="url(#softShadow)">
        <circle cx="1490" cy="165" r="34" fill="#ec9eb4" />
        <path d="M1468 158 C1482 145 1501 149 1513 138 M1465 174 C1482 162 1501 171 1518 159" fill="none" stroke="#ad5d88" stroke-width="6" stroke-linecap="round" opacity=".75" />
      </g>
      <g class="planet planet-c" filter="url(#softShadow)">
        <circle cx="878" cy="350" r="25" fill="#f6d18c" />
        <ellipse cx="878" cy="350" rx="45" ry="12" fill="none" stroke="#fff6df" stroke-width="8" transform="rotate(-18 878 350)" />
      </g>

      <g class="giant-flower flower-a" transform="translate(1320 700)">
        <circle r="42" fill="#ffcb65" />
        <ellipse rx="30" ry="84" fill="#f8a9be" transform="rotate(0) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#f8a9be" transform="rotate(72) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#f8a9be" transform="rotate(144) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#f8a9be" transform="rotate(216) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#f8a9be" transform="rotate(288) translate(0 -74)" />
      </g>
      <g class="giant-flower flower-b" transform="translate(1460 780) scale(.7)">
        <circle r="42" fill="#f27a91" />
        <ellipse rx="30" ry="84" fill="#d7eaa7" transform="rotate(0) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#d7eaa7" transform="rotate(72) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#d7eaa7" transform="rotate(144) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#d7eaa7" transform="rotate(216) translate(0 -74)" />
        <ellipse rx="30" ry="84" fill="#d7eaa7" transform="rotate(288) translate(0 -74)" />
      </g>

      <g class="little-flowers" opacity=".92">
        <g transform="translate(720 778)"><circle r="12" fill="#ffe8a8"/><circle cy="-22" r="15" fill="#fff4d7"/><circle cx="20" cy="-6" r="15" fill="#fff4d7"/><circle cx="12" cy="18" r="15" fill="#fff4d7"/><circle cx="-12" cy="18" r="15" fill="#fff4d7"/><circle cx="-20" cy="-6" r="15" fill="#fff4d7"/></g>
        <g transform="translate(805 840) scale(.8)"><circle r="12" fill="#f46c90"/><circle cy="-22" r="15" fill="#f9c4d2"/><circle cx="20" cy="-6" r="15" fill="#f9c4d2"/><circle cx="12" cy="18" r="15" fill="#f9c4d2"/><circle cx="-12" cy="18" r="15" fill="#f9c4d2"/><circle cx="-20" cy="-6" r="15" fill="#f9c4d2"/></g>
        <g transform="translate(990 790) scale(.65)"><circle r="12" fill="#fff2b5"/><circle cy="-22" r="15" fill="#d9ecaa"/><circle cx="20" cy="-6" r="15" fill="#d9ecaa"/><circle cx="12" cy="18" r="15" fill="#d9ecaa"/><circle cx="-12" cy="18" r="15" fill="#d9ecaa"/><circle cx="-20" cy="-6" r="15" fill="#d9ecaa"/></g>
      </g>

      <g class="butterfly butterfly-a" transform="translate(970 470) rotate(-16)" fill="#f76e92">
        <ellipse cx="-14" cy="0" rx="15" ry="25" transform="rotate(-30)" />
        <ellipse cx="14" cy="0" rx="15" ry="25" transform="rotate(30)" />
        <rect x="-2" y="-13" width="4" height="27" rx="2" fill="#6f4b79" />
      </g>
      <g class="butterfly butterfly-b" transform="translate(1430 340) rotate(20) scale(.7)" fill="#fff3bb">
        <ellipse cx="-14" cy="0" rx="15" ry="25" transform="rotate(-30)" />
        <ellipse cx="14" cy="0" rx="15" ry="25" transform="rotate(30)" />
        <rect x="-2" y="-13" width="4" height="27" rx="2" fill="#a26482" />
      </g>

      <g class="sparkles" fill="#fff9e8" filter="url(#glow)">
        <path d="M1100 160 l7 18 18 7-18 7-7 18-7-18-18-7 18-7z" />
        <path d="M1510 300 l5 13 13 5-13 5-5 13-5-13-13-5 13-5z" />
        <path d="M885 255 l4 10 10 4-10 4-4 10-4-10-10-4 10-4z" />
      </g>

      <path class="orbit orbit-a" d="M860 400 C1030 290 1240 280 1500 395" fill="none" stroke="#f16d90" stroke-width="5" stroke-linecap="round" opacity=".62" />
      <path class="orbit orbit-b" d="M990 132 C1140 48 1390 57 1560 150" fill="none" stroke="#fff5d6" stroke-width="4" stroke-linecap="round" opacity=".62" />
    </svg>
    <div class="dream-grain"></div>
    <div class="dream-vignette"></div>
  </div>

  <header class="dream-header reveal-item">
    <a href="index.html" class="dream-brand" aria-label="Kembali ke halaman utama">
      <img class="dream-brand-logo" src="assets/branding/unsent-mark.png" alt="" aria-hidden="true" />
      <span class="dream-brand-copy">
        <strong>UNSENT</strong>
        <small>private correspondence</small>
      </span>
    </a>
    <span class="dream-edition">THE UNSAID COLLECTION</span>
  </header>

  <main class="dream-main">
    <section class="dream-copy reveal-item" aria-labelledby="page-title">
      <p class="dream-kicker"><span></span> Somewhere between us</p>
      <h1 id="page-title">A message<br />is waiting<br /><em>for you.</em></h1>
      <p class="dream-description">
        Somewhere in this little space, there may be a message written especially for you.
      </p>

      <form id="inviteForm" class="invite-form dream-form" novalidate>
        <label class="sr-only" for="inviteCode">Invitation code</label>
        <p id="formMessage" class="form-message dream-feedback" role="status" aria-live="polite"></p>
        <div class="input-wrap dream-input">
          <input
            id="inviteCode"
            name="inviteCode"
            type="text"
            inputmode="text"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
            placeholder="ENTER YOUR CODE"
            maxlength="30"
            aria-describedby="formMessage"
          />
          <button id="submitButton" type="submit" aria-label="Buka pesan">
            <span class="button-label">OPEN</span>
            <span class="button-arrow" aria-hidden="true">↗</span>
          </button>
        </div>
      </form>
    </section>

    <div class="dream-side-title reveal-item" aria-hidden="true">
      <span>PRIVATE</span>
      <strong>01</strong>
    </div>
  </main>

  <div id="successOverlay" class="success-overlay dream-success" aria-hidden="true">
    <div class="success-portal" aria-hidden="true">
      <span class="success-orbit orbit-one"></span>
      <span class="success-orbit orbit-two"></span>
      <span class="success-star">✦</span>
    </div>
    <div class="success-card">
      <p class="success-kicker">Invitation recognized</p>
      <h2>Welcome, <span id="guestName">friend</span>.</h2>
      <p>Your message is opening.</p>
      <div class="loading-line"><span></span></div>
    </div>
  </div>

  <button id="ownerResetButton" class="owner-reset-button" type="button" aria-label="Reset one-time read history"></button>

  <script src="js/messages.js?v=20260629-scrollfix3"></script>
  <script src="js/app.js?v=20260629-scrollfix3"></script>
</body>
</html>
